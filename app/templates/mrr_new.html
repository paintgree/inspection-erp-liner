{% extends "base.html" %}
{% block content %}

<div class="card">
  <h1>Create MRR Ticket</h1>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/mrr/new" class="form mt">

    <label>Material Name</label>
    <input name="material_name" required>

    <label>Supplier Name</label>
    <input name="supplier_name" required>

    <label>PO Number</label>
    <input name="po_number" required>

    <label>Quantity</label>
    <input name="quantity" type="number" step="0.01" required>

    <label>Unit</label>
    <select name="quantity_unit">
      <option value="KG">KG</option>
      <option value="T">Ton</option>
      <option value="PCS">PCS</option>
    </select>

    <label>Lot Type</label>
    <select name="lot_type" id="lot_type">
      <option value="RAW">RAW</option>
      <option value="OUTSOURCED">OUTSOURCED</option>
    </select>

    <div id="layerUseWrap">
      <label>Layer Use</label>
      <select name="layer_use" id="layer_use">
        <option value="">-- select layer --</option>
        <option value="LINER">LINER</option>
        <option value="REINFORCEMENT">REINFORCEMENT</option>
        <option value="COVER">COVER</option>
      </select>
      <div class="muted tiny mt">
        Only RAW material with a layer assignment can be used in production runs.
      </div>
    </div>

    <div class="mt">
      <button class="btn btn-primary" type="submit">
        Create Ticket
      </button>
      <a href="/mrr/tickets" class="btn btn-muted">Cancel</a>
    </div>

  </form>
</div>

<script>
  (function () {
    const lotType = document.getElementById("lot_type");
    const wrap = document.getElementById("layerUseWrap");
    const layer = document.getElementById("layer_use");
    if (!lotType || !wrap || !layer) return;

    function syncLayerUse() {
      const isRaw = lotType.value === "RAW";
      wrap.style.display = isRaw ? "" : "none";
      layer.required = isRaw;
      if (!isRaw) layer.value = "";
    }

    lotType.addEventListener("change", syncLayerUse);
    syncLayerUse();
  })();
</script>

{% endblock %}
