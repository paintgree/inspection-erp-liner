{% extends "base.html" %}
{% block title %}New Qualification Program{% endblock %}
{% block content %}
<div class="card" style="max-width:980px;margin:0 auto;">
  <div class="section-head">
    <div>
      <h1 style="margin:0;">New R&amp;D Qualification Program</h1>
      <div class="muted">Use this for PFR or PV programs under API 15S.</div>
    </div>
    <a class="btn btn-ghost" href="/rnd/qualifications">Back</a>
  </div>

  <form method="post" action="/rnd/qualifications/new" class="grid-2 mt">
    <label>
      Program Code
      <input name="program_code" required placeholder="Q-4IN-10MPA-65C-PFR">
    </label>
    <label>
      Title
      <input name="title" required placeholder="4 in / 10 MPa / 65 C Qualification">
    </label>
    <label>
      Nominal Size (in)
      <input name="nominal_size_in" type="number" step="0.01" value="4">
    </label>
    <label>
      NPR (MPa)
      <input name="npr_mpa" type="number" step="0.01" value="10">
    </label>
    <label>
      MAOT (°C)
      <input name="maot_c" type="number" step="0.1" value="65">
    </label>
    <label>
      LAOT (°C)
      <input name="laot_c" type="number" step="0.1" value="0">
    </label>
    <label>
      Program Type
      <select name="pfr_or_pv">
        <option value="PFR">PFR</option>
        <option value="PV">PV</option>
      </select>
    </label>
    <label>
      Parent PFR Program ID (only for PV)
      <input name="parent_program_id" type="number" step="1" placeholder="Example: 1">
    </label>
    <label style="grid-column:1 / -1;">
      Intended Service
      <input name="intended_service" value="Static water service">
    </label>
    <label style="grid-column:1 / -1;">
      Notes
      <textarea name="notes" rows="5" placeholder="Project notes, end-fitting assumptions, cyclic service notes, etc."></textarea>
    </label>
    <div style="grid-column:1 / -1;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" type="submit">Create Program</button>
      <a class="btn btn-ghost" href="/rnd/qualifications">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
