{% extends "base.html" %}
{% block content %}
<a class="btn btn-ghost" href="/dashboard">← Back</a>

<div class="card">
  <h1>Start New Production Run</h1>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/runs/new">
    <div class="grid2">
      <div style="grid-column:1 / -1;">
        <label>Create Layer(s)</label>
        <div class="toolbar" style="gap:14px; flex-wrap:wrap; margin-top:8px;">
          <label style="display:flex; gap:8px; align-items:center;">
            <input type="checkbox" name="selected_processes" value="LINER" checked>
            LINER
          </label>
          <label style="display:flex; gap:8px; align-items:center;">
            <input type="checkbox" name="selected_processes" value="REINFORCEMENT" checked>
            REINFORCEMENT
          </label>
          <label style="display:flex; gap:8px; align-items:center;">
            <input type="checkbox" name="selected_processes" value="COVER" checked>
            COVER
          </label>
        </div>
        <div class="muted tiny mt">
          You can create 1, 2, or all 3 layers in one step. Each layer will still be editable separately later.
        </div>
      </div>

      <div>
        <label>Batch No</label>
        <input name="dhtp_batch_no" required>
      </div>

      <div>
        <label>Client Name</label>
        <input name="client_name" required>
      </div>

      <div>
        <label>PO Number</label>
        <input name="po_number" required>
      </div>

      <div>
        <label>ITP Number</label>
        <input name="itp_number" required>
      </div>

      <div>
        <label>Pipe Specification</label>
        <input name="pipe_specification" required>
      </div>

      <div>
        <label>Raw Material Spec</label>
        <input name="raw_material_spec" required>
      </div>

      <div>
        <label>Total Pipe Length (m)</label>
        <input name="total_length_m" type="number" step="0.01" value="0">
      </div>
    </div>

    <div class="mt">
      <label style="display:flex; gap:10px; align-items:center;">
        <input type="checkbox" name="allow_duplicate" value="1">
        Allow duplicate line for same Batch + Process
      </label>
    </div>

    <div class="toolbar mt">
      <button class="btn btn-primary" type="submit">Create Run(s)</button>
      <a class="btn" href="/dashboard">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
